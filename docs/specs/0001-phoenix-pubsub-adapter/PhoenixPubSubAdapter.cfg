\* TLC model configuration for PhoenixPubSubAdapter.tla
\*
\* Small finite bounds. The point of the model is to surface the safety
\* and liveness properties for review, not to do exhaustive search at
\* large scale. Increase MaxPubs / Pids for a deeper run.

CONSTANTS
    Nodes = {n1, n2}
    Pids  = {p1, p2}
    Topics = {t1, t2}
    MaxPubs = 3

SPECIFICATION Spec

INVARIANTS
    TypeOK
    AtMostOnce
    NoMisDelivery
    NoSelfDelivery

PROPERTIES
    EventualDelivery
